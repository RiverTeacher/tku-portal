<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #message {
            font-size: 1.1rem;
        }
        .error {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader" class="loader"></div>
        <div id="message">ステータスを確認中...</div>
    </div>

    <script>
        const CHECK_URL = 'https://riverteacher.gitlab.io/yk-english-vocabulary-test/takayarpg2/status.html';
        const REDIRECT_URL = 'https://portal.tku.net';

        async function checkStatusAndRedirect() {
            const messageEl = document.getElementById('message');
            const loaderEl = document.getElementById('loader');

            try {
                // Fetch the status from the source
                const response = await fetch(CHECK_URL, {
                    method: 'GET',
                    mode: 'cors', // Ensure CORS is handled
                    cache: 'no-store'
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const text = await response.text();
                const status = text.trim().toLowerCase();

                if (status === 'allow') {
                    messageEl.textContent = '認証されました。リダイレクトします...';
                    window.location.href = REDIRECT_URL;
                } else {
                    loaderEl.style.display = 'none';
                    messageEl.textContent = 'アクセスが許可されていません (Status: ' + status + ')';
                    messageEl.className = 'error';
                }
            } catch (error) {
                console.error('Error fetching status:', error);
                loaderEl.style.display = 'none';
                messageEl.textContent = 'ステータスの取得に失敗しました。';
                messageEl.className = 'error';
            }
        }

        // Start process on load
        window.onload = checkStatusAndRedirect;
    </script>
</body>
</html>
