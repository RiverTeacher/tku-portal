<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>接続中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .card {
            background: white;
            padding: 48px 56px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
            min-width: 320px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0066cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        p {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        .status-list {
            margin-top: 24px;
            text-align: left;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            font-size: 13px;
            color: #666;
        }
        .status-item::before {
            content: "";
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e0e0e0;
            flex-shrink: 0;
        }
        .status-item.done::before {
            background: #0066cc;
        }
        .status-item.done {
            color: #1a1a1a;
        }
        .status-item.current {
            color: #0066cc;
        }
        .status-item.current::before {
            background: #0066cc;
            animation: pulse 1.5s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        #success, #error {
            display: none;
        }
        .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .icon.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .icon.error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="card" id="loading">
        <div class="loader"></div>
        <h1>システム確認中</h1>
        <p>接続状況を確認しています</p>
        <div class="status-list">
            <div class="status-item done">サーバーに接続</div>
            <div class="status-item current">認証情報を確認</div>
            <div class="status-item">リダイレクト準備</div>
        </div>
    </div>

    <div class="card" id="success">
        <div class="icon success">✓</div>
        <h1>確認完了</h1>
        <p>リダイレクトします</p>
    </div>

    <div class="card" id="error">
        <div class="icon error">✕</div>
        <h1>アクセス不可</h1>
        <p>現在サービスを利用できません</p>
    </div>

    <script>
        const timestamp = Date.now();
        const apiUrl = `https://riverteacher.gitlab.io/yk-english-vocabulary-test/takayarpg2/status.html?t=${timestamp}`;
        const redirectUrl = `https://portal.tku.ac.jp?t=${timestamp}`;

        fetch(apiUrl)
            .then(response => response.text())
            .then(text => {
                const loading = document.getElementById('loading');
                const success = document.getElementById('success');
                const error = document.getElementById('error');

                if (text.trim() === 'allow') {
                    loading.style.display = 'none';
                    success.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 800);
                } else {
                    loading.style.display = 'none';
                    error.style.display = 'block';
                }
            })
            .catch(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            });
    </script>
</body>
</html>
