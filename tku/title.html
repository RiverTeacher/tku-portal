<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>モダン英単語クイズ | 学習記録機能付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* モダンでフラットなデザイン - グラデーション排除 */
        .container {
            background: #ffffff;
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
            max-width: 720px;
            width: 100%;
            transition: all 0.2s ease;
            border: 1px solid #eef2f6;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 28px;
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        /* 進捗エリア */
        .progress-section {
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 10px;
            transition: width 0.25s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            color: #475569;
            margin-top: 10px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* クエスチョンボックス フラットモダン */
        .question-box {
            background: #f8fafc;
            border-radius: 24px;
            padding: 32px 24px;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid #eef2ff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .question-text {
            font-size: 1.35rem;
            line-height: 1.6;
            color: #1e293b;
            font-weight: 450;
        }

        .blank {
            display: inline-block;
            min-width: 110px;
            border-bottom: 3px solid #3b82f6;
            margin: 0 4px;
            color: #2563eb;
            font-weight: 600;
            background: #eff6ff;
            padding: 0 6px;
            border-radius: 8px;
        }

        /* オプションボタン モダン・フラット */
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .option-btn {
            padding: 16px 12px;
            border: 1.5px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            color: #1e293b;
            text-align: center;
            letter-spacing: -0.2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .option-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .option-btn.correct {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .option-btn.wrong {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.9;
            transform: none;
        }

        /* モーダル フラットデザイン */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 28px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            animation: modalPop 0.2s ease;
            border: 1px solid #f0f2f5;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-icon {
            font-size: 44px;
            margin-bottom: 8px;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .modal-title.incorrect { color: #dc2626; }
        .modal-title.correct { color: #10b981; }

        .answer-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #eef2ff;
        }

        .answer-word {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .answer-meaning {
            font-size: 1rem;
            color: #475569;
        }

        .detail-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .detail-item {
            background: #ffffff;
            border-radius: 18px;
            padding: 14px 16px;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7;
        }

        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 0.95rem;
            color: #0f172a;
            line-height: 1.4;
        }

        .detail-value.example {
            font-style: italic;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-btn:hover {
            background: #1e293b;
        }

        /* 正解演出（簡易紙吹雪） */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .success-overlay.active {
            display: block;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            opacity: 0.8;
            animation: fall 2s ease-out forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* 結果画面 */
        .final-result {
            text-align: center;
            display: none;
        }

        .score-display {
            background: #f8fafc;
            border-radius: 32px;
            padding: 32px;
            margin: 20px 0;
            border: 1px solid #eef2ff;
        }

        .score {
            font-size: 3.8rem;
            font-weight: 800;
            color: #0f172a;
        }

        .score-label {
            font-size: 1rem;
            color: #475569;
            margin-top: 8px;
        }

        .result-message {
            font-size: 1.2rem;
            margin: 20px 0;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 28px;
            color: #0f172a;
        }

        .restart-btn {
            padding: 14px 28px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .restart-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        /* セーブ情報バー */
        .save-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            background: #f9f9fc;
            padding: 10px 16px;
            border-radius: 60px;
            font-size: 0.75rem;
            color: #334155;
            border: 1px solid #eef2f6;
        }

        .resume-btn {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            color: #2563eb;
            transition: 0.1s;
        }

        .resume-btn:hover {
            background: #eef2ff;
            border-color: #3b82f6;
        }

        .clear-data-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.7rem;
            text-decoration: underline;
            margin-left: 12px;
        }

        .error-message, .loading {
            text-align: center;
            padding: 40px;
            color: #475569;
        }

        @media (max-width: 550px) {
            .container { padding: 20px; }
            .options { grid-template-columns: 1fr; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="success-overlay" id="successOverlay"></div>

<div class="container">
    <div id="status-check" class="loading">
        📡 読み込み中...
    </div>

    <div id="error-screen" style="display: none;">
        <h1>⚠️ エラー</h1>
        <div class="error-message">
            通信が確認できませんでした。<br>
            ネットワークをご確認の上、再読み込みしてください。
        </div>
    </div>

    <div id="quiz-screen" class="quiz-container" style="display: none;">
        <h1>📖 英単語クイズ</h1>

        <!-- 進行状況保存バー -->
        <div class="save-status" id="saveStatusBar">
            <span>💾 回答記録が自動保存されます</span>
            <button class="resume-btn" id="resetProgressBtn">🗑 記録リセット</button>
        </div>

        <div class="progress-section">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text">問題 <span id="current">1</span> / <span id="total">46</span></div>
        </div>

        <div class="question-box">
            <div class="question-text" id="question"></div>
        </div>

        <div class="options" id="options"></div>
    </div>

    <div id="final-screen" class="final-result">
        <h2>🎉 クイズ完了！</h2>
        <div class="score-display">
            <div class="score"><span id="correct-count">0</span> / <span id="total-count">0</span></div>
            <div class="score-label">正解数</div>
        </div>
        <div class="result-message" id="resultMessage"></div>
        <button class="restart-btn" id="finalRestartBtn">🔄 もう一度挑戦</button>
    </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-icon" id="modalIcon">❌</div>
            <div class="modal-title incorrect" id="modalTitle">不正解...</div>
        </div>
        <div class="answer-section">
            <div class="answer-word" id="modalWord"></div>
            <div class="answer-meaning" id="modalMeaning"></div>
        </div>
        <div class="detail-grid">
            <div class="detail-item">
                <div class="detail-label">📘 英文例</div>
                <div class="detail-value example" id="modalExample"></div>
            </div>
            <div class="detail-item">
                <div class="detail-label">🇯🇵 日本語訳</div>
                <div class="detail-value" id="modalExampleJa"></div>
            </div>
        </div>
        <button class="modal-btn" id="modalBtn">次の問題へ →</button>
    </div>
</div>

<script>
    // ---------- 語彙データ (全46単語) ----------
    const vocabularyData = [
        {"word": "merchandise", "meaning": "品物", "example": "The customer is examining some merchandise.", "example_ja": "The customer is examining some 品物."},
        {"word": "groceries", "meaning": "食料品", "example": "A man is loading some groceries into a delivery van.", "example_ja": "A man is loading some 食料品 into a delivery van."},
        {"word": "produce", "meaning": "農作物", "example": "He's removing some produce from the shelf.", "example_ja": "He's removing some 農作物 from the shelf."},
        {"word": "vendor", "meaning": "露天商人、納入業者", "example": "A vendor is arranging some merchandise.", "example_ja": "A 露天商人 is arranging some merchandise."},
        {"word": "pedestrian", "meaning": "通行人", "example": "Pedestrians are crossing the street.", "example_ja": "通行人s are crossing the street."},
        {"word": "cashier", "meaning": "レジ係", "example": "The customer is paying the cashier.", "example_ja": "The customer is paying the レジ係."},
        {"word": "equipment", "meaning": "装置", "example": "A man is putting away a piece of equipment.", "example_ja": "A man is putting away a piece of 装置."},
        {"word": "stairs", "meaning": "階段", "example": "People are gathering near the stairs.", "example_ja": "People are gathering near the 階段."},
        {"word": "railing", "meaning": "手すり", "example": "Some people are leaning on the railing of the stairs.", "example_ja": "Some people are leaning on the 手すり of the stairs."},
        {"word": "stool", "meaning": "椅子", "example": "The man is lifting a stool.", "example_ja": "The man is lifting a 椅子."},
        {"word": "drawer", "meaning": "引き出し", "example": "One of the women is pointing at a drawer.", "example_ja": "One of the women is pointing at a 引き出し."},
        {"word": "luggage", "meaning": "荷物", "example": "He's stacking some luggage on a cart.", "example_ja": "He's stacking some 荷物 on a cart."},
        {"word": "instrument", "meaning": "器具、楽器", "example": "The repairman is adjusting an instrument.", "example_ja": "The repairman is adjusting an 器具."},
        {"word": "vehicle", "meaning": "車両、伝達手段", "example": "She's unloading some produce from a vehicle.", "example_ja": "She's unloading some produce from a 車両."},
        {"word": "ladder", "meaning": "はしご", "example": "The carpenter is resting his hand on a rung of the ladder.", "example_ja": "The carpenter is resting his hand on a rung of the はしご."},
        {"word": "construction", "meaning": "建設", "example": "A vehicle is parked on the construction site.", "example_ja": "A vehicle is parked on the 建設 site."},
        {"word": "facility", "meaning": "施設", "example": "The facility is under construction.", "example_ja": "The 施設 is under construction."},
        {"word": "traffic", "meaning": "通行、交通量", "example": "There is much traffic in the facility.", "example_ja": "There is much 通行 in the facility."},
        {"word": "bin", "meaning": "容器、ゴミ箱", "example": "All the bins have been sealed.", "example_ja": "All the 容器s have been sealed."},
        {"word": "sink", "meaning": "流し台", "example": "A bin is leaning against the sink.", "example_ja": "A bin is leaning against the 流し台."},
        {"word": "stroll", "meaning": "散策", "example": "We took a stroll around the facility after lunch.", "example_ja": "We took a 散策 around the facility after lunch."},
        {"word": "awning", "meaning": "日よけ", "example": "Some produce is laid out under the awning.", "example_ja": "Some produce is laid out under the 日よけ."},
        {"word": "fountain", "meaning": "噴水", "example": "The fountain is decorated with some lights.", "example_ja": "The 噴水 is decorated with some lights."},
        {"word": "pillar", "meaning": "柱", "example": "There is a pillar at the entrance of the driveway.", "example_ja": "There is a 柱 at the entrance of the driveway."},
        {"word": "appliance", "meaning": "電気器具", "example": "An electric appliance has been unplugged.", "example_ja": "An electric 電気器具 has been unplugged."},
        {"word": "utensil", "meaning": "調理器具", "example": "Polished kitchen utensils are hung above the sink.", "example_ja": "Polished kitchen 調理器具s are hung above the sink."},
        {"word": "lid", "meaning": "ふた", "example": "The lid of the copy machine has been left open.", "example_ja": "The ふた of the copy machine has been left open."},
        {"word": "beverage", "meaning": "飲み物", "example": "He's pouring the beverage into the glass.", "example_ja": "He's pouring the 飲み物 into the glass."},
        {"word": "dock", "meaning": "埠頭、波止場、ドック", "example": "Some boats are tied to the dock.", "example_ja": "Some boats are tied to the 埠頭."},
        {"word": "pier", "meaning": "突堤、桟橋", "example": "Waves are splashing on the side of the pier.", "example_ja": "Waves are splashing on the side of the 突堤."},
        {"word": "across from", "meaning": "…の向かいに", "example": "A piece of equipment is positioned across from the ladder.", "example_ja": "A piece of equipment is positioned …の向かいに the ladder."},
        {"word": "opposite", "meaning": "反対の、…の反対に", "example": "Some vehicles are driving in opposite directions.", "example_ja": "Some vehicles are driving in 反対の directions."},
        {"word": "in a row", "meaning": "横一列になって", "example": "Some lids are arranged in a row.", "example_ja": "Some lids are arranged 横一列になって."},
        {"word": "side by side", "meaning": "横に並んで", "example": "The appliances are on display side by side.", "example_ja": "The appliances are on display 横に並んで."},
        {"word": "crowded", "meaning": "混雑した", "example": "The shelter is crowded with people.", "example_ja": "The shelter is 混雑した with people."},
        {"word": "occupied", "meaning": "使用中の", "example": "Some of the stools are occupied.", "example_ja": "Some of the stools are 使用中の."},
        {"word": "reflect", "meaning": "映す、熟考する", "example": "Pillars are reflected in the window.", "example_ja": "Pillars are 映された in the window."},
        {"word": "shallow", "meaning": "浅い", "example": "A high-rise building is reflected in the shallow water.", "example_ja": "A high-rise building is reflected in the 浅い water."},
        {"word": "parallel", "meaning": "平行の", "example": "A vehicle is parked parallel to the curb.", "example_ja": "A vehicle is parked 平行に to the curb."},
        {"word": "overlook", "meaning": "を見渡す、監督する、を見逃す", "example": "The balcony overlooks the pier.", "example_ja": "The balcony 見渡す the pier."},
        {"word": "paved", "meaning": "舗装された", "example": "Pedestrians are walking on the paved road.", "example_ja": "Pedestrians are walking on the 舗装された road."},
        {"word": "scattered", "meaning": "散らばった", "example": "Some utensils are scattered on the stove.", "example_ja": "Some utensils are 散らばった on the stove."},
        {"word": "surround", "meaning": "…を囲む", "example": "The fountain is surrounded by a brick wall.", "example_ja": "The fountain is 囲まれた by a brick wall."},
        {"word": "tow", "meaning": "けん引", "example": "A ship is being towed into dock.", "example_ja": "A ship is being けん引された into dock."},
        {"word": "winding", "meaning": "曲がりくねった", "example": "The winding alley is being paved.", "example_ja": "The 曲がりくねった alley is being paved."}
    ];

    // ---------- グローバル変数 ----------
    let shuffledQuestions = [];      // ランダム順 (実際の問題リスト)
    let currentIndex = 0;           // 現在の問題インデックス (0 ~ length-1)
    let totalCorrect = 0;
    let answeredLock = false;

    // Cookie 操作ユーティリティ (expires = 30日)
    function setCookie(name, value, days = 30) {
        const date = new Date();
        date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
        document.cookie = `${name}=${encodeURIComponent(JSON.stringify(value))}; expires=${date.toUTCString()}; path=/; SameSite=Lax`;
    }

    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        if (match) {
            try {
                return JSON.parse(decodeURIComponent(match[2]));
            } catch(e) { return null; }
        }
        return null;
    }

    // セーブデータ構造: { version, shuffledOrder, currentIdx, correctCount, totalLength }
    const SAVE_VERSION = 2;
    function saveProgress() {
        if (!shuffledQuestions.length) return;
        const saveData = {
            version: SAVE_VERSION,
            shuffledOrder: shuffledQuestions.map(q => q.word), // 単語で保存
            currentIdx: currentIndex,
            correctCount: totalCorrect,
            totalLength: shuffledQuestions.length
        };
        setCookie('vocab_quiz_progress', saveData);
    }

    function loadProgressFromCookie() {
        const saved = getCookie('vocab_quiz_progress');
        if (!saved || saved.version !== SAVE_VERSION) return null;
        // 復元: shuffledQuestions を元データから再構築
        if (!saved.shuffledOrder || saved.shuffledOrder.length !== vocabularyData.length) return null;
        const reconstructed = [];
        for (let word of saved.shuffledOrder) {
            const found = vocabularyData.find(v => v.word === word);
            if (found) reconstructed.push(found);
        }
        if (reconstructed.length !== vocabularyData.length) return null;
        return {
            questions: reconstructed,
            currentIdx: saved.currentIdx,
            correctCount: saved.correctCount
        };
    }

    function resetProgress() {
        // クッキー削除
        document.cookie = "vocab_quiz_progress=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        // UI リセット
        initNewGame();
        renderQuizScreen();
    }

    // シャッフル
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initNewGame() {
        shuffledQuestions = shuffleArray([...vocabularyData]);
        currentIndex = 0;
        totalCorrect = 0;
        answeredLock = false;
        saveProgress();
    }

    // 問題表示に使う選択肢生成
    function generateOptions(correctWord, allWordsArray) {
        const options = [correctWord];
        const otherWords = allWordsArray.filter(w => w !== correctWord);
        const shuffledOthers = shuffleArray([...otherWords]);
        for (let i = 0; i < 5 && i < shuffledOthers.length; i++) {
            options.push(shuffledOthers[i]);
        }
        return shuffleArray(options);
    }

    // 紙吹雪 (シンプル)
    function createConfetti() {
        const overlay = document.getElementById('successOverlay');
        overlay.innerHTML = '';
        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
        for (let i = 0; i < 60; i++) {
            const conf = document.createElement('div');
            conf.classList.add('confetti');
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.width = Math.random() * 8 + 4 + 'px';
            conf.style.height = Math.random() * 8 + 4 + 'px';
            conf.style.animationDelay = Math.random() * 1.5 + 's';
            overlay.appendChild(conf);
        }
        overlay.classList.add('active');
        setTimeout(() => overlay.classList.remove('active'), 2000);
    }

    function showModal(isCorrect, question) {
        const modal = document.getElementById('modal');
        const icon = document.getElementById('modalIcon');
        const title = document.getElementById('modalTitle');
        const btn = document.getElementById('modalBtn');
        if (isCorrect) {
            icon.textContent = '✅';
            title.textContent = '正解！';
            title.className = 'modal-title correct';
            btn.textContent = '次の問題へ →';
        } else {
            icon.textContent = '❌';
            title.textContent = '不正解...';
            title.className = 'modal-title incorrect';
            btn.textContent = '理解した！次へ →';
        }
        document.getElementById('modalWord').innerText = question.word;
        document.getElementById('modalMeaning').innerText = question.meaning;
        document.getElementById('modalExample').innerText = question.example;
        document.getElementById('modalExampleJa').innerText = question.example_ja;
        modal.classList.add('active');
    }

    function closeModalAndNext() {
        document.getElementById('modal').classList.remove('active');
        currentIndex++;
        if (currentIndex < shuffledQuestions.length) {
            renderCurrentQuestion();
            saveProgress();
        } else {
            showFinalResult();
            // クイズ完了時にクッキーをクリア（新しい開始時にリセットされるように）
            document.cookie = "vocab_quiz_progress=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        }
    }

    function updateProgressBar() {
        const percent = ((currentIndex) / shuffledQuestions.length) * 100;
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('current').innerText = currentIndex + 1;
        document.getElementById('total').innerText = shuffledQuestions.length;
    }

    function renderCurrentQuestion() {
        answeredLock = false;
        const q = shuffledQuestions[currentIndex];
        const allWordList = vocabularyData.map(v => v.word);
        const opts = generateOptions(q.word, allWordList);
        // 穴埋めテキスト生成: 例文中の日本語意味を<span class="blank">で囲む
        let questionHtml = q.example_ja;
        const meanings = q.meaning.split('、');
        meanings.forEach(meaning => {
            const regex = new RegExp(meaning, 'g');
            questionHtml = questionHtml.replace(regex, `<span class="blank">${meaning}</span>`);
        });
        document.getElementById('question').innerHTML = questionHtml;
        updateProgressBar();
        const container = document.getElementById('options');
        container.innerHTML = '';
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, q);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, question) {
        if (answeredLock) return;
        answeredLock = true;
        const isCorrect = (selected === question.word);
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === question.word) btn.classList.add('correct');
            else if (btn.innerText === selected && !isCorrect) btn.classList.add('wrong');
        });
        if (isCorrect) {
            totalCorrect++;
            createConfetti();
        }
        setTimeout(() => {
            showModal(isCorrect, question);
        }, 500);
    }

    function showFinalResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('final-screen').style.display = 'block';
        document.getElementById('correct-count').innerText = totalCorrect;
        document.getElementById('total-count').innerText = shuffledQuestions.length;
        const percent = (totalCorrect / shuffledQuestions.length) * 100;
        let msg = '';
        if (percent === 100) msg = '🌟 パーフェクト！全問正解おめでとう！';
        else if (percent >= 80) msg = '🎉 素晴らしい！高得点です！';
        else if (percent >= 60) msg = '👍 よくできました！もう少し頑張りましょう！';
        else msg = '💪 また挑戦してみましょう！';
        document.getElementById('resultMessage').innerText = msg;
    }

    function renderQuizScreen() {
        document.getElementById('status-check').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('final-screen').style.display = 'none';
        renderCurrentQuestion();
    }

    function startOrResumeQuiz() {
        const saved = loadProgressFromCookie();
        if (saved && saved.questions && saved.questions.length === vocabularyData.length && saved.currentIdx < vocabularyData.length) {
            // 続きから再開
            shuffledQuestions = saved.questions;
            currentIndex = saved.currentIdx;
            totalCorrect = saved.correctCount;
            answeredLock = false;
            renderQuizScreen();
        } else {
            initNewGame();
            renderQuizScreen();
        }
    }

    // エラーハンドリング + 通信チェック (fetch status check)
    function showError() {
        document.getElementById('status-check').style.display = 'none';
        document.getElementById('error-screen').style.display = 'block';
    }

    // グローバルにcloseModalを定義 (HTML内のonclickで使われないように、全てイベントで管理)
    window.closeModal = closeModalAndNext;

    window.onload = function() {
        // 通信チェック (軽量)
        fetch('https://riverteacher.gitlab.io/yk-english-vocabulary-test/takayarpg2/status.html')
            .then(res => res.text())
            .then(text => {
                if (text.trim() === 'allow') {
                    startOrResumeQuiz();
                    // リセットボタン
                    document.getElementById('resetProgressBtn').addEventListener('click', (e) => {
                        e.preventDefault();
                        if (confirm('記録をリセットし、最初から始めますか？')) {
                            resetProgress();
                        }
                    });
                    // final画面の再挑戦ボタン
                    document.getElementById('finalRestartBtn').addEventListener('click', () => {
                        resetProgress();
                    });
                    document.getElementById('modalBtn').addEventListener('click', closeModalAndNext);
                } else {
                    showError();
                }
            })
            .catch(() => showError());
    };
</script>
</body>
</html>
